<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DemliCoin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <!-- Sonuç overlay -->
  <div id="sonuc-overlay" class="sonuc-overlay" style="display:none;">
    <div class="sonuc-ic">
      <div id="sonuc-rakam" class="sonuc-rakam">+0</div>
      <div class="sonuc-alt">JETON</div>
    </div>
  </div>

  <div id="uygulama">
    <!-- ÜST BAR -->
    <header class="ust-bar">
      <div class="logo-alan">
        <div class="logo-mark">DC</div>
        <span class="logo-text">DemliCoin</span>
      </div>
      <div class="kullanici-bilgi" id="kullanici-bilgi-alan">
        <span class="nick-pill" id="hosgeldin-nick"></span>
        <div class="jeton-pill">
          <span class="jeton-label">JETON</span>
          <span class="jeton-sayi" id="jeton-miktar">0</span>
        </div>
        <div class="nav-sep"></div>
        <a href="/market" class="nav-link">Market</a>
        <a href="/liderlik" class="nav-link">Liderlik</a>
        <button onclick="cikisYap()" class="btn-ghost-kirmizi">Cikis</button>
      </div>
      <div id="misafir-alan" style="display:none;">
        <a href="/giris" class="btn-outline">Giris Yap</a>
        <a href="/kayit" class="btn-altin">Kayit Ol</a>
      </div>
    </header>

    <div class="ana-icerik">
      <!-- SOL: Oyuncular -->
      <aside class="sol-panel">
        <div class="panel-baslik">
          <span>CEVRIMICI</span>
          <span class="badge-sayac" id="oyuncu-sayisi">0</span>
        </div>
        <div id="oyuncu-listesi" class="oyuncu-listesi"></div>
      </aside>

      <!-- ORTA: Grafik + Oyun -->
      <main class="orta-alan">

        <!-- Grafik kartı -->
        <div class="grafik-kart">
          <div class="grafik-header">
            <div class="grafik-sol">
              <span class="grafik-sembol">DC / JETON</span>
              <span class="grafik-canli-dot"></span>
              <span class="grafik-canli-text">CANLI</span>
            </div>
            <span id="grafik-deger" class="canli-deger mono deger-yesil">—</span>
          </div>
          <canvas id="grafik-canvas"></canvas>
        </div>

        <!-- Bahis paneli -->
        <div class="bahis-kart" id="bahis-panel" style="display:none;">
          <div class="bahis-header">
            <span class="bahis-baslik">POZİSYON AC</span>
            <div id="geri-sayim" class="geri-sayim-rakam" style="display:none;">5</div>
          </div>
          <div class="bahis-ic">
            <div class="miktar-grup">
              <label class="miktar-label">JETON MIKTARI</label>
              <div class="miktar-input-wrap">
                <input type="number" id="bahis-miktar" value="100" min="1" class="miktar-input" />
                <div class="hizli-miktarlar">
                  <button onclick="hizliMiktar(50)">50</button>
                  <button onclick="hizliMiktar(100)">100</button>
                  <button onclick="hizliMiktar(250)">250</button>
                  <button onclick="hizliMiktar(500)">500</button>
                </div>
              </div>
            </div>
            <button id="bas-btn" class="bas-btn" onclick="basBahistePara()">BAS</button>
          </div>
        </div>

        <!-- Giriş uyarısı (misafir) -->
        <div id="giris-uyari" class="giris-uyari-kart">
          <p>Oynamak icin hesap acmalisiniz</p>
          <div class="giris-uyari-butonlar">
            <a href="/kayit" class="btn-altin">Kayit Ol — 500 Jeton Bedava</a>
            <a href="/giris" class="btn-outline">Giris Yap</a>
          </div>
        </div>

        <!-- Item bar -->
        <div id="item-bar" class="item-bar"></div>

        <!-- Bildirim -->
        <div id="bildirim-bar" class="bildirim-bar" style="display:none;"></div>

        <!-- Chat -->
        <div class="chat-kart">
          <div class="chat-header">CANLI CHAT</div>
          <div id="chat-mesajlar" class="chat-mesajlar"></div>
          <div class="chat-form">
            <input id="chat-input" class="chat-input" type="text" placeholder="Mesaj yaz..." maxlength="200" />
            <button onclick="mesajGonder()" class="chat-gonder-btn">GONDER</button>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="/oyun.js"></script>
</body>
</html>
